<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>트램펄린 파워 카운터</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: -apple-system, sans-serif;
            overflow: hidden;
            touch-action: manipulation;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.2s;
        }

        /* 메인 카운트 숫자 */
        #count {
            font-size: 120px;
            font-weight: 900;
            color: #00FF41; /* 매트릭스 그린 */
            text-shadow: 0 0 20px rgba(0, 255, 65, 0.5);
            margin: 0;
            transition: transform 0.05s;
        }

        /* 상태 메시지 */
        #status {
            font-size: 18px;
            font-weight: bold;
            color: #aaa;
            margin-top: -10px;
        }

        /* 목표 달성 시 연출 */
        .finished {
            background-color: #ff0000 !important;
        }
        .finished #count {
            color: #ffffff;
            text-shadow: 0 0 30px #000;
            animation: shake 0.1s infinite;
        }

        @keyframes shake {
            0% { transform: translate(2px, 2px); }
            50% { transform: translate(-2px, -2px); }
            100% { transform: translate(2px, -2px); }
        }

        /* 리셋 버튼 */
        #reset-btn {
            position: absolute;
            bottom: 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #333;
            color: #666;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 14px;
            z-index: 10;
        }
    </style>
</head>
<body onclick="handleTap()">
    <div id="count">0</div>
    <div id="status">READY?</div>
    <button id="reset-btn" onclick="resetCount(event)">RESET</button>

    <script>
        let count = 0;
        const maxCount = 200;
        const countEl = document.getElementById('count');
        const statusEl = document.getElementById('status');
        
        // 오디오 컨텍스트 설정
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        // 강렬한 삐이익! 소리 함수
        function playAggressiveBeep() {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            // 사각파(Square)를 사용하여 찢어지는 듯한 강한 소리 생성
            osc.type = 'square';
            // 1500Hz의 아주 높은 고음
            osc.frequency.setValueAtTime(1500, audioCtx.currentTime);
            // 소리가 약간 길게 "삐이이익" 하도록 설정
            osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.3);

            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);

            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        }

        function handleTap() {
            if (count < maxCount) {
                count++;
                countEl.innerText = count;
                
                // 1. 소리 재생
                playAggressiveBeep();

                // 2. 진동 (워치 하드웨어 지원 시)
                if (navigator.vibrate) {
                    navigator.vibrate(100); 
                }

                // 3. 시각 효과
                countEl.style.transform = "scale(1.4)";
                setTimeout(() => { countEl.style.transform = "scale(1)"; }, 50);
                
                statusEl.innerText = "KEEP GOING!";
                statusEl.style.color = "#00FF41";

                // 목표 달성 체크
                if (count === maxCount) {
                    document.body.classList.add('finished');
                    statusEl.innerText = "MISSION COMPLETE!";
                    statusEl.style.color = "#fff";
                    // 목표 달성 시엔 더 긴 진동
                    if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
                }
            }
        }

        function resetCount(event) {
            event.stopPropagation();
            count = 0;
            countEl.innerText = count;
            statusEl.innerText = "READY?";
            statusEl.style.color = "#aaa";
            document.body.classList.remove('finished');
            if (navigator.vibrate) navigator.vibrate(50);
        }
    </script>
</body>
</html>
